<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acesso - Copa Farid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-grad-1: #0f2027;
            --bg-grad-2: #203a43;
            --bg-grad-3: #2c5364;
            --gold-primary: #f6d365;
            --gold-secondary: #fda085;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2), var(--bg-grad-3));
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        .login-glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem 2rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .logo-icon {
            font-size: 4rem;
            background: -webkit-linear-gradient(45deg, var(--gold-primary), var(--gold-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .form-control-app {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            color: white;
            min-height: 65px;
            font-size: 1.2rem;
            padding-left: 50px;
        }

        .form-control-app:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--gold-primary);
            color: white;
            box-shadow: none;
        }

        .form-control-app::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .input-icon {
            position: absolute;
            left: 20px;
            top: 22px;
            color: var(--gold-primary);
            font-size: 1.2rem;
        }

        .btn-gold {
            background: linear-gradient(45deg, var(--gold-primary), var(--gold-secondary));
            border: none;
            border-radius: 16px;
            color: #1a1a1a;
            font-weight: 900;
            font-size: 1.3rem;
            min-height: 65px;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 1rem;
            box-shadow: 0 10px 20px rgba(246, 211, 101, 0.3);
            transition: all 0.2s;
        }

        .btn-gold:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="login-glass text-center animate__animated animate__zoomIn">
        <i class="fa-solid fa-trophy logo-icon"></i>
        <h2 class="fw-bold mb-1">COPA FARID</h2>
        <p class="text-light opacity-75 mb-4">Acesso à Central do Draft</p>

        {% if form.errors %}
            <div class="alert alert-danger rounded-pill border-0" role="alert">
                <i class="fa-solid fa-triangle-exclamation me-2"></i> Credenciais inválidas.
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="position-relative mb-3">
                <i class="fa-solid fa-user input-icon"></i>
                <input type="text" name="username" class="form-control form-control-app" placeholder="Seu ID (ex: fernando)" required autocomplete="off">
            </div>

            <div class="position-relative mb-4">
                <i class="fa-solid fa-lock input-icon"></i>
                <input type="password" name="password" class="form-control form-control-app" placeholder="Senha" required>
            </div>

            <button type="submit" class="btn-gold">
                Entrar <i class="fa-solid fa-right-to-bracket ms-2"></i>
            </button>
        </form>
    </div>
</div>

</body>
</html>
